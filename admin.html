<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - TechStore</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <!-- Admin Header -->
  <header class="header" style="background: var(--dark); color: white;">
    <nav class="nav" style="justify-content: space-between;">
      <div class="logo" style="color: white;">TechStore Admin</div>
      <div class="notification-panel" id="notificationPanel" style="display: flex; gap: 1rem; background: none; box-shadow: none; position: static;">
        <button onclick="showAdminPage('dashboard')" style="background: none; border: none; color: white; cursor: pointer;">
          <i class="fas fa-tachometer-alt"></i> Dashboard
        </button>
        <button onclick="showAdminPage('settings')" style="background: none; border: none; color: white; cursor: pointer;">
          <i class="fas fa-cog"></i> Settings
        </button>
        <button onclick="logout()" style="background: none; border: none; color: white; cursor: pointer;">
          <i class="fas fa-sign-out-alt"></i> Logout
        </button>
      </div>
    </nav>
  </header>

  <!-- Dashboard -->
  <div id="dashboard-page" class="admin-panel">
    <h1>Admin Dashboard</h1>
    <div class="products-grid">
      <div class="product-card">
        <div style="font-size: 3rem; color: var(--primary); text-align: center; margin-bottom: 1rem;">
          <i class="fas fa-shopping-cart"></i>
        </div>
        <h3>Total Orders</h3>
        <div style="font-size: 2.5rem; font-weight: 800; color: var(--primary);">1,247</div>
      </div>
      <div class="product-card">
        <div style="font-size: 3rem; color: var(--accent); text-align: center; margin-bottom: 1rem;">
          <i class="fas fa-dollar-sign"></i>
        </div>
        <h3>Revenue</h3>
        <div style="font-size: 2.5rem; font-weight: 800; color: var(--accent);">$456,789</div>
      </div>
      <div class="product-card">
        <div style="font-size: 3rem; color: #f59e0b; text-align: center; margin-bottom: 1rem;">
          <i class="fas fa-users"></i>
        </div>
        <h3>Customers</h3>
        <div style="font-size: 2.5rem; font-weight: 800; color: #f59e0b;">892</div>
      </div>
      <div class="product-card">
        <div style="font-size: 3rem; color: #10b981; text-align: center; margin-bottom: 1rem;">
          <i class="fas fa-star"></i>
        </div>
        <h3>Avg Rating</h3>
        <div style="font-size: 2.5rem; font-weight: 800; color: #10b981;">4.8⭐</div>
      </div>
    </div>

    <div style="margin-top: 3rem;">
      <h2>Recent Activity</h2>
      <div class="products-grid">
        <div class="product-card">
          <div style="display: flex; align-items: center; gap: 1rem;">
            <div style="width: 50px; height: 50px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700;">JD</div>
            <div>
              <div style="font-weight: 600;">John Doe ordered iPhone 16 Pro</div>
              <div style="color: var(--gray);">2 minutes ago</div>
            </div>
          </div>
        </div>
        <!-- More activity items -->
      </div>
    </div>
  </div>

  <!-- Settings Page -->
  <div id="settings-page" class="admin-panel" style="display: none;">
    <h1>Website Settings</h1>
    
    <div class="settings-grid">
      <div class="form-group">
        <label>Website Name</label>
        <input type="text" id="websiteName" value="TechStore Electronics" style="width: 100%; padding: 1rem; border-radius: var(--radius); border: 2px solid var(--border);">
      </div>

      <div class="form-group">
        <label>Website Type</label>
        <select id="websiteType" style="width: 100%; padding: 1rem; border-radius: var(--radius); border: 2px solid var(--border);">
          <option>Ecommerce Store</option>
          <option>Service Provider</option>
          <option>Portfolio</option>
          <option>Blog</option>
        </select>
      </div>

      <div class="form-group">
        <label>Languages</label>
        <select id="languages" multiple style="width: 100%; padding: 1rem; border-radius: var(--radius); border: 2px solid var(--border);">
          <option selected>English</option>
          <option>Spanish</option>
          <option>French</option>
          <option>German</option>
        </select>
      </div>

      <div class="form-group">
        <label>Primary Color</label>
        <input type="color" id="primaryColor" value="#2563eb" style="width: 100%; height: 50px; border: none; border-radius: var(--radius); cursor: pointer;">
      </div>

      <div class="form-group">
        <label>Domain Icon (Favicon)</label>
        <input type="file" id="favicon" accept="image/*">
        <small>Upload 32x32 PNG for favicon</small>
      </div>

      <div class="form-group">
        <label>App Settings</label>
        <div>
          <label style="display: block; margin-bottom: 0.5rem;">
            <input type="checkbox" id="darkMode" checked> Enable Dark Mode
          </label>
          <label style="display: block; margin-bottom: 0.5rem;">
            <input type="checkbox" id="cartAnimation"> Cart Animations
          </label>
        </div>
      </div>

      <div class="form-group">
        <label>Active Plugins</label>
        <div style="display: flex; flex-wrap: wrap; gap: 1rem;">
          <label style="background: #f1f5f9; padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.9rem;">
            <input type="checkbox" checked> Analytics
          </label>
          <label style="background: #f1f5f9; padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.9rem;">
            <input type="checkbox"> SEO Tools
          </label>
          <label style="background: #f1f5f9; padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.9rem;">
            <input type="checkbox" checked> Email Marketing
          </label>
        </div>
      </div>
    </div>

    <button class="btn" onclick="saveSettings()" style="width: 100%; margin-top: 2rem;">Save All Settings</button>
  </div>

  <script src="script.js"></script>
  <script>
    // Auto-show dashboard
    showAdminPage('dashboard');
  </script>
</body>
</html>
